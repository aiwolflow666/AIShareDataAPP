<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K线图</title>
  <script src="echarts.min.js?v=5"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
    .bar { background: #1e293b; padding: 12px 16px; display: flex; gap: 8px; align-items: center; }
    .bar input { flex: 1; padding: 9px 12px; border: none; border-radius: 8px; font-size: 14px; }
    .bar button { padding: 9px 16px; border: none; border-radius: 8px; background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer; }
    .bar select { padding: 9px 8px; border: none; border-radius: 8px; font-size: 13px; }
    #results { background: #fff; max-height: 240px; overflow-y: auto; }
    #results .item { padding: 8px 14px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
    #results .item:hover { background: #eff6ff; }
    #chart { width: 100%; height: calc(100vh - 54px); min-height: 400px; }
    .info { padding: 8px 16px; background: #fff; font-size: 14px; font-weight: 600; display: none; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="bar">
    <input id="kw" placeholder="股票代码或名称,如 600519" />
    <select id="scale">
      <option value="240">日线</option>
      <option value="1200">周线</option>
      <option value="7200">月线</option>
      <option value="60">60分钟</option>
      <option value="30">30分钟</option>
    </select>
    <button id="btn">搜索</button>
  </div>
  <div id="results"></div>
  <div id="info" class="info"></div>
  <div id="chart"></div>
  <script src="config.js?v=5"></script>
  <script>
    const $ = s => document.querySelector(s);
    let chart = echarts.init($('#chart'));
    window.addEventListener('resize', () => chart.resize());

    async function search() {
      const kw = $('#kw').value.trim();
      if (!kw) return;
      $('#results').innerHTML = '搜索中...';
      try {
        const r = await fetch(`${window.API_BASE}/search?keyword=${encodeURIComponent(kw)}`);
        const data = await r.json();
        if (!data.length) { $('#results').innerHTML = '<div class="item">无结果</div>'; return; }
        $('#results').innerHTML = data.map(d => `<div class="item" data-s="${d["代码"]}" data-n="${d["名称"]}">${d["代码"]} ${d["名称"]}</div>`).join('');
      } catch(e) { $('#results').innerHTML = `<div class="item">错误: ${e.message}</div>`; }
    }

    async function loadKline(symbol, name) {
      $('#results').innerHTML = '';
      $('#info').style.display = 'block';
      $('#info').textContent = `${name} (${symbol}) 加载中...`;
      const scale = $('#scale').value;
      const sinaCode = symbol.startsWith('6') || symbol.startsWith('9') ? `sh${symbol}` : `sz${symbol}`;
      try {
        const r = await fetch(`https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=${sinaCode}&scale=${scale}&ma=no&datalen=500`);
        const text = await r.text();
        const data = JSON.parse(text || '[]');
        if (!data.length) { $('#info').textContent = '无数据'; return; }

        // 计算均线
        const closes = data.map(d => parseFloat(d.close));
        const ma5 = [], ma10 = [], ma20 = [], ma60 = [];
        for (let i = 0; i < data.length; i++) {
          ma5.push(i >= 4 ? avg(closes.slice(i-4, i+1)) : null);
          ma10.push(i >= 9 ? avg(closes.slice(i-9, i+1)) : null);
          ma20.push(i >= 19 ? avg(closes.slice(i-19, i+1)) : null);
          ma60.push(i >= 59 ? avg(closes.slice(i-59, i+1)) : null);
        }

        $('#info').textContent = `${name} (${symbol}) ${data.length}根K线 最新收盘:${closes[closes.length-1]}`;

        chart.setOption({
          tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
          legend: { data: ['K线','MA5','MA10','MA20','MA60','成交量'], top: 5 },
          grid: [
            { left: 60, right: 30, top: 40, height: '58%' },
            { left: 60, right: 30, top: '74%', height: '16%' }
          ],
          xAxis: [
            { type: 'category', data: data.map(d => d.day), scale: true, boundaryGap: false, axisLine: { onZero: false }, splitLine: { show: false }, axisLabel: { fontSize: 10 } },
            { type: 'category', gridIndex: 1, data: data.map(d => d.day), axisLabel: { show: false } }
          ],
          yAxis: [
            { scale: true, splitArea: { show: true } },
            { gridIndex: 1, splitNumber: 2 }
          ],
          dataZoom: [
            { type: 'inside', xAxisIndex: [0, 1], start: 60, end: 100 },
            { type: 'slider', xAxisIndex: [0, 1], start: 60, end: 100, height: 18, bottom: 8 }
          ],
          series: [
            { name: 'K线', type: 'candlestick', data: data.map(d => [parseFloat(d.open), parseFloat(d.close), parseFloat(d.low), parseFloat(d.high)]),
              itemStyle: { color: '#dc2626', color0: '#16a34a', borderColor: '#dc2626', borderColor0: '#16a34a' } },
            { name: 'MA5', type: 'line', data: ma5, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#f59e0b' } },
            { name: 'MA10', type: 'line', data: ma10, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#8b5cf6' } },
            { name: 'MA20', type: 'line', data: ma20, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#3b82f6' } },
            { name: 'MA60', type: 'line', data: ma60, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#6b7280' } },
            { name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 1, data: data.map(d => parseInt(d.volume) || 0),
              itemStyle: { color: '#93c5fd' } }
          ]
        }, true);
      } catch(e) { $('#info').textContent = '错误: ' + e.message; }
    }

    function avg(arr) { return arr.reduce((a,b) => a+b, 0) / arr.length; }

    $('#btn').addEventListener('click', search);
    $('#kw').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
    $('#results').addEventListener('click', e => {
      const item = e.target.closest('.item');
      if (item && item.dataset.s) loadKline(item.dataset.s, item.dataset.n);
    });
    $('#scale').addEventListener('change', () => {
      const info = $('#info').textContent;
      const m = info.match(/(.+?) \((\d+)\)/);
      if (m) loadKline(m[2], m[1]);
    });
  </script>
</body>
</html>
