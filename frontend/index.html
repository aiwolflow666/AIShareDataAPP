<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票分析</title>
  <link rel="stylesheet" href="style.css?v=3" />
  <script src="echarts.min.js?v=3"></script>
  <script src="marked.min.js?v=3"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>📈 股票分析</h1>
      <div class="search-bar">
        <input id="symbolInput" type="text" placeholder="输入股票代码(如 600519)或名称" autocomplete="off" />
        <button id="searchBtn">搜索</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </header>

  <main class="app-main">
    <div id="stockBar" class="stock-bar" style="display:none;">
      <span id="currentStockName" class="stock-name"></span>
    </div>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="info">公司信息</button>
      <button class="tab-btn" data-tab="history">历史股价</button>
      <button class="tab-btn" data-tab="finance">财务</button>
      <button class="tab-btn" data-tab="industry">所属行业</button>
      <button class="tab-btn" data-tab="orderbook">订单/行情</button>
      <button class="tab-btn" data-tab="predict">股价预测</button>
      <button class="tab-btn analysis-tab" data-tab="analysis">🤖 AI 分析</button>
    </nav>

    <section id="content" class="content">
      <div class="placeholder">
        <div class="placeholder-icon">🔍</div>
        <p>请先搜索并选择一只股票</p>
      </div>
    </section>
  </main>

  <script src="config.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
